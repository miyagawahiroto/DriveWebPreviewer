<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>01 単一ファイル（インライン）</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #e8f0fe, #fff);
        color: #202124;
      }
      .card {
        background: #fff;
        padding: 2rem 2.5rem;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(26, 115, 232, 0.15);
        max-width: 480px;
      }
      h1 { color: #1a73e8; margin-top: 0; }
      ul { line-height: 1.9; padding-left: 1.2em; }
      .ok { color: #137333; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>01 単一ファイル</h1>
      <p>外部ファイル参照なし。HTML・CSS・JS をすべてインラインで持つ最小ケース。</p>
      <ul>
        <li class="ok">✓ HTML がレンダリングされた</li>
        <li class="ok">✓ インライン CSS が適用された（このカードのスタイル）</li>
        <li id="js">… JS 未実行</li>
      </ul>
    </div>
    <script>
      document.getElementById("js").textContent = "✓ インライン JS が実行された";
      document.getElementById("js").className = "ok";
    </script>
  </body>
</html>
