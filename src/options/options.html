<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DriveWebPreviewer 設定</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 560px;
        margin: 40px auto;
        padding: 0 16px;
        color: #202124;
      }
      h1 {
        font-size: 18px;
      }
      section {
        margin: 24px 0;
        padding: 16px;
        border: 1px solid #e0e0e0;
        border-radius: 10px;
      }
      h2 {
        font-size: 14px;
        margin-top: 0;
      }
      button {
        padding: 8px 14px;
        border: none;
        border-radius: 8px;
        background: #1a73e8;
        color: #fff;
        font-size: 13px;
        cursor: pointer;
      }
      .msg {
        font-size: 12px;
        color: #137333;
        margin-left: 8px;
      }
    </style>
  </head>
  <body>
    <h1>DriveWebPreviewer 設定</h1>
    <section>
      <h2>キャッシュ</h2>
      <p>取得済みファイルのキャッシュを削除します。表示がおかしいときに実行してください。</p>
      <button id="clear-cache">キャッシュを削除</button>
      <span class="msg" id="clear-msg" hidden>削除しました</span>
    </section>
    <section>
      <h2>認証（サインアウト / 初回認証の再現）</h2>
      <p>
        キャッシュ済みのトークンを解除します。次回プレビュー時に再度サインインが必要になります。
      </p>
      <p>
        <strong>初回の同意画面まで再現したい場合</strong>は、加えて
        <a href="https://myaccount.google.com/connections" target="_blank" rel="noopener"
          >Google アカウントのアプリ連携</a
        >
        で本アプリのアクセスを削除してください。
      </p>
      <button id="sign-out">サインアウト（トークン解除）</button>
      <span class="msg" id="signout-msg" hidden>トークンを解除しました</span>
    </section>
    <script type="module" src="options.js"></script>
  </body>
</html>
